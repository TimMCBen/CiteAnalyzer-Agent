<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>CiteAnalyzer Stage 7 World Map Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      color: #1f2937;
      background: linear-gradient(180deg, #efe4cf 0%, #f4efe6 100%);
      font-family: Georgia, "Times New Roman", serif;
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      border: 1px solid #dfd1ba;
      border-radius: 20px;
      padding: 24px;
      background: #fffaf2;
      box-shadow: 0 12px 30px rgba(95, 63, 38, 0.08);
    }
    #map {
      height: 560px;
      min-height: 560px;
    }
    .muted {
      color: #6b7280;
    }
    .data-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      padding-left: 0;
      list-style: none;
    }
    .data-list li {
      display: flex;
      justify-content: space-between;
      border: 1px solid #dfd1ba;
      border-radius: 12px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
  <main>
    <h1>Stage 7 施引来源国家/地区地图 Demo</h1>
    <p class="muted">运行方式：在仓库根目录执行 <code>python -m http.server 8765</code>，然后打开 <code>http://localhost:8765/scripts/dev/report_world_map_demo.html</code>。</p>
    <div id="map" role="img" aria-label="施引来源国家地区地图"></div>
    <p id="map-note" class="muted"></p>
    <ul id="fallback-list" class="data-list"></ul>
  </main>
  <script>
    const countryDistribution = {
      "China": 72,
      "United States": 19,
      "Unknown": 33,
      "Singapore": 4,
      "Hong Kong": 2,
      "South Korea": 1,
      "United Kingdom": 2
    };
    const mapItems = [
      { name: "China", value: 72 },
      { name: "United States of America", value: 19 },
      { name: "Singapore", value: 4 },
      { name: "Hong Kong S.A.R.", value: 2 },
      { name: "United Kingdom", value: 2 },
      { name: "South Korea", value: 1 }
    ];
    const unknownCount = countryDistribution.Unknown;

    const fallback = document.getElementById("fallback-list");
    fallback.innerHTML = Object.entries(countryDistribution)
      .map(([name, value]) => `<li><span>${name}</span><strong>${value}</strong></li>`)
      .join("");

    fetch("../../packages/reporting/static/world.geo.json")
      .then(response => response.json())
      .then(worldGeoJson => {
        echarts.registerMap("world", worldGeoJson);
        const chart = echarts.init(document.getElementById("map"), null, { renderer: "svg" });
        chart.setOption({
          tooltip: {
            trigger: "item",
            formatter: params => `${params.name}: ${params.value || 0}`
          },
          visualMap: {
            min: 0,
            max: 72,
            left: 12,
            bottom: 18,
            text: ["高", "低"],
            calculable: true,
            inRange: { color: ["#f7e8d1", "#c98a4a", "#7f3418"] }
          },
          series: [{
            name: "施引来源",
            type: "map",
            map: "world",
            roam: true,
            emphasis: { label: { show: true } },
            data: mapItems
          }]
        });
        document.getElementById("map-note").textContent = `Unknown=${unknownCount} 不参与地图着色，只在下方列表保留。`;
        window.addEventListener("resize", () => chart.resize());
      })
      .catch(error => {
        document.getElementById("map-note").textContent = `地图资源加载失败：${error}`;
      });
  </script>
</body>
</html>
